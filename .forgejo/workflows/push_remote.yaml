name: Push to Remotes

on:
  push:

jobs:

  build:
    runs-on: docker
    container:
      image: ghcr.io/catthehacker/ubuntu:act-22.04

    name: Push to Remotes
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # This fetches all history for all branches and tags

      - name: Configure Git
        run: |
          git config --global user.name "jordan"
          git config --global user.email "sudo-adduser-jordan@gmail.com"

      # - name: Remove History
      #   run: |
      #     git checkout --orphan reset_branch
      #     git add .
      #     git commit -m "v0.0.1"
      #     git branch -M main
      #     # push 'main' because we renamed the orphan branch above

      - name: Push to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: |
          git remote add github https://github.com/${{ github.repository }}.git
          git push -f https://$GITHUB_TOKEN@github.com/${{ github.repository }}.git main

      - name: Push to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.TOKEN_CODEBERG }}
        run: |
          git remote add codeberg https://codeberg.org/${{ github.repository }}.git
          git push -f https://$CODEBERG_TOKEN@codeberg.org/${{ github.repository }}.git main

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.TOKEN_GITLAB }}
        run: |
          git remote add gitlab https://gitlab.com/${{ github.repository }}.git
          git push -f https://server:$GITLAB_TOKEN@gitlab.com/${{ github.repository }}.git main
          